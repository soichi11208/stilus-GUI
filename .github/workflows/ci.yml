name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools, fonts used by text tests, Xvfb, and X11 auth link deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ meson ninja-build pkg-config \
            fonts-dejavu-core fonts-noto-cjk xvfb libxau-dev libxdmcp-dev

      - name: Configure
        run: meson setup build --buildtype=debugoptimized

      - name: Build
        run: meson compile -C build

      - name: Run headless unit + golden-image tests
        run: meson test -C build --print-errorlogs

      - name: Run X11 integration smoke test (Xvfb)
        working-directory: build
        run: xvfb-run -a env -u WAYLAND_DISPLAY ./test_x11_integration
